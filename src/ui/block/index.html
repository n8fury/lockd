<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locked in — Lockd</title>
    <link rel="stylesheet" href="./block.css" />
  </head>
  <body>
    <main class="block">
      <div class="mark">◆</div>
      <p class="eyebrow" id="eyebrow">Focus locked</p>
      <h1 class="headline">This one can wait.</h1>
      <p class="intent" id="intent"></p>

      <div class="countdown" id="countdown">
        <span class="label">Break in</span>
        <span class="time" id="time">--:--</span>
      </div>

      <p class="foot" id="foot">Lockd is holding the line so you can stay in flow.</p>
    </main>
    <script type="module" src="./block.js"></script>
  </body>
</html>
