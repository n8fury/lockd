<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lockd</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="brand">
        <div class="brand-mark">◆</div>
        <span class="brand-name">Lockd</span>
        <span class="status-pill" id="statusPill">idle</span>
      </div>

      <div class="timer" id="timer">--:--</div>
      <div class="sub" id="sub">No session</div>

      <div class="controls" id="controls">
        <button class="btn primary" data-action="start-test">Test 6s/4s</button>
        <button class="btn primary" data-action="start-standard">50 / 10 · 2h</button>
        <button class="btn" data-action="pause">Pause</button>
        <button class="btn" data-action="resume">Resume</button>
        <button class="btn" data-action="skip">Skip phase</button>
        <button class="btn danger" data-action="stop">Stop</button>
      </div>

      <label class="toggle">
        <input type="checkbox" id="alwaysOn" />
        <span>Always-on focus</span>
      </label>

      <div class="ytlock">
        <label class="toggle">
          <input type="checkbox" id="ytLock" />
          <span>YouTube channel lock</span>
        </label>
        <div class="ytrow">
          <input type="text" id="ytInput" placeholder="@channel, /channel/UC…, or URL" />
          <button class="btn" data-action="yt-add">Add</button>
        </div>
        <ul class="ytlist" id="ytList"></ul>
      </div>

      <p class="hint">Phase 4 · channel allowlist (debug)</p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
