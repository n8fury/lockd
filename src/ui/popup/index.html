<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lockd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="brand">
        <div class="brand-mark">◆</div>
        <span class="brand-name">Lockd</span>
        <span class="status-pill" id="statusPill"><span class="dot"></span> idle</span>
      </div>

      <div class="timer font-mono" id="timer">--:--</div>
      <p class="intent font-serif" id="intent">No active session</p>

      <div class="controls" id="controls"></div>

      <label class="switch">
        <input type="checkbox" id="alwaysOn" />
        <span>Always-on focus</span>
      </label>

      <button class="dash-link" id="openDash">Open dashboard →</button>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
